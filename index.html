<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hikikomori</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:'Cormorant Garamond', serif;
    overflow:hidden;
}

/* FONDO DINÁMICO */
#bgImage{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    opacity:0;
    filter:blur(6px) brightness(0.35);
    transition:opacity 1.5s ease;
    z-index:-2;
}

canvas{
    position:fixed;
    top:0;
    left:0;
}

#particles{ z-index:0; }

#grain{
    z-index:2;
    pointer-events:none;
    opacity:0.08;
}

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    opacity:0;
    transition:opacity 1s ease;
    z-index:1;
    pointer-events:none;
}

.intro{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
    transition:opacity 1s ease;
}

.intro h1{
    font-size:3.5em;
    letter-spacing:10px;
    font-weight:300;
}

.intro button{
    margin-top:40px;
    padding:12px 35px;
    background:transparent;
    border:1px solid #444;
    color:#aaa;
    cursor:pointer;
    transition:all 0.5s ease;
}

.intro button:hover{
    border-color:white;
    color:white;
    letter-spacing:3px;
    box-shadow:0 0 30px rgba(255,255,255,0.2);
}

.main{
    display:none;
    height:100vh;
    position:relative;
    z-index:3;
}

.home{
    display:flex;
    height:100%;
    transition:opacity 0.8s ease, transform 0.8s ease;
}

.left{
    flex:2;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding-left:10%;
}

#mainTitle{
    font-size:4em;
    letter-spacing:12px;
    font-weight:300;
    margin:0;
}

.subtitle{
    color:#888;
    font-style:italic;
    margin-top:20px;
    font-size:1.2em;
}

.dedicatoria{
    margin-top:10px;
    font-size:0.8em;
    color:#666;
    letter-spacing:2px;
    opacity:0.7;
}

.right{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.menu a{
    display:block;
    margin:25px 0;
    cursor:pointer;
    color:#555;
    font-size:1.4em;
    transition:all 0.5s ease;
}

.menu a:hover{
    color:white;
    letter-spacing:5px;
    text-shadow:0 0 20px rgba(255,255,255,0.5);
}

.section-view{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    opacity:0;
    transform:translateY(40px);
    transition:opacity 1s ease, transform 1s ease;
}

.section-view.active{
    opacity:1;
    transform:translateY(0);
}

.section-title{
    position:absolute;
    top:40px;
    font-size:2.5em;
    letter-spacing:10px;
    opacity:0.7;
}

.section-content{
    max-width:700px;
    font-size:1.5em;
    color:#fff;
    line-height:1.6;
    text-shadow:0 0 20px rgba(0,0,0,0.8);
}

.back{
    position:absolute;
    bottom:50px;
    padding:12px 35px;
    border:1px solid #444;
    color:#aaa;
    cursor:pointer;
    transition:all 0.5s ease;
}

.back:hover{
    border-color:white;
    color:white;
    box-shadow:0 0 30px rgba(255,255,255,0.3);
}
</style>
</head>
<body>

<div id="bgImage"></div>

<canvas id="particles"></canvas>
<canvas id="grain"></canvas>
<div class="overlay" id="overlay"></div>

<div class="intro">
    <h1>HIKIKOMORI</h1>
    <button onclick="enter()">Entrar</button>
</div>

<div class="main" id="main">

    <div class="home" id="home">
        <div class="left">
            <h1 id="mainTitle">HIKIKOMORI</h1>
            <div class="subtitle">El eco de mis pensamientos</div>
            <div class="dedicatoria">Portafolios para mi querida Monica ke coexiste, Moonenzo te quiere</div>
        </div>

        <div class="right">
            <div class="menu">
                <a onclick="openSection('nuncadije')">Lo que nunca dije</a>
                <a onclick="openSection('cuandotepienso')">Cuando te pienso</a>
                <a onclick="openSection('loquekeda')">Lo que queda</a>
                <a onclick="openSection('sivuelves')">Si algún día vuelves</a>
            </div>
        </div>
    </div>

    <div class="section-view" id="sectionView">
        <div class="section-title">HIKIKOMORI</div>
        <div class="section-content" id="sectionText"></div>
        <div class="back" onclick="goBack()">Volver atrás</div>
    </div>

</div>

<audio id="music" loop>
  <source src="elephant1.mp3" type="audio/mpeg">
</audio>

<script>
function enter(){
    document.querySelector(".intro").style.opacity="0";
    setTimeout(()=>{
        document.querySelector(".intro").style.display="none";
        document.getElementById("main").style.display="block";
        document.getElementById("music").play();
    },1000);
}

const texts={
    nuncadije:`Nunca te dije que detrás de mi insistencia había miedo.
No miedo a estar solo,
sino miedo a perder algo que sentía de verdad.

Nunca quise presionarte.
Solo quería que supieras que lo que sentía no era un juego.
Que no estaba aquí por costumbre,
sino porque contigo algo era distinto.`,

    cuandotepienso:`Cuando te pienso no recuerdo las discusiones.
Recuerdo tu voz tranquila.
Recuerdo cómo me sentía cuando estabas bien.

A veces me pregunto si todo esto te da ansiedad
porque sientes demasiado,
igual que yo.
Y si eso asusta,
no te culpo.`,

    loquekeda:`Lo que queda no es rabia.
Es incertidumbre.
Es querer abrazarte y no saber si puedo.

Sé que tienes miedo.
Sé que dudas.
Pero incluso ahora,
cuando todo es confuso,
lo que siento por ti no ha cambiado.`,

    sivuelves:`Si algún día vuelves,
no quiero que sea por presión.
Quiero que sea porque te sientes segura.
Porque eliges quedarte.
Porque confías.

Y si necesitas tiempo para eso,
yo no voy a convertir tu miedo en un castigo.`
};

function openSection(name){
    const bg=document.getElementById("bgImage");
    bg.style.backgroundImage=`url(${name}.jpg)`;
    bg.style.opacity="1";

    document.getElementById("overlay").style.opacity="0.6";

    const home=document.getElementById("home");
    home.style.opacity="0";
    home.style.transform="translateY(-40px)";
    
    setTimeout(()=>{
        home.style.display="none";
        const section=document.getElementById("sectionView");
        document.getElementById("sectionText").innerText=texts[name];
        section.style.display="flex";
        setTimeout(()=>section.classList.add("active"),50);
    },800);
}

function goBack(){
    document.getElementById("overlay").style.opacity="0";
    document.getElementById("bgImage").style.opacity="0";

    const section=document.getElementById("sectionView");
    section.classList.remove("active");
    
    setTimeout(()=>{
        section.style.display="none";
        const home=document.getElementById("home");
        home.style.display="flex";
        setTimeout(()=>{
            home.style.opacity="1";
            home.style.transform="translateY(0)";
        },50);
    },800);
}
</script>

</body>
</html>
