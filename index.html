<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hikikomori</title>

<style>
body {
    margin: 0;
    background: #000;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* Intro */
.intro {
    position: absolute;
    width: 100%;
    height: 100vh;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 5;
}

.intro h1 {
    font-size: 3em;
    letter-spacing: 8px;
    font-weight: 200;
}

.intro button {
    margin-top: 40px;
    padding: 12px 30px;
    background: transparent;
    border: 1px solid #555;
    color: #aaa;
    cursor: pointer;
    transition: 0.3s;
}

.intro button:hover {
    border-color: white;
    color: white;
}

/* Layout */
.main {
    display: none;
    height: 100vh;
}

.container {
    display: flex;
    height: 100%;
}

.left {
    flex: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 10%;
}

.left h1 {
    font-size: 3.5em;
    letter-spacing: 8px;
    font-weight: 200;
    margin: 0;
}

.left p {
    color: #aaa;
    font-style: italic;
    margin-top: 15px;
    animation: glow 3s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px rgba(255,255,255,0.2); }
    to { text-shadow: 0 0 15px rgba(255,255,255,0.4); }
}

.right {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.menu a {
    display: block;
    color: #666;
    text-decoration: none;
    margin: 20px 0;
    font-size: 1.2em;
    cursor: pointer;
    transition: 0.3s;
}

.menu a:hover {
    color: white;
    letter-spacing: 4px;
}

/* Secciones */
.section {
    position: absolute;
    bottom: 15%;
    left: 10%;
    max-width: 600px;
    color: #bbb;
    opacity: 0;
    transition: opacity 0.5s ease;
}

.section.active {
    opacity: 1;
}
</style>
</head>
<body>

<div class="intro">
    <h1>HIKIKOMORI</h1>
    <button onclick="enter()">Entrar con sonido</button>
</div>

<div class="main" id="main">

    <div class="container">
        <div class="left">
            <h1>HIKIKOMORI</h1>
            <p>El eco de mis pensamientos</p>
        </div>

        <div class="right">
            <div class="menu">
                <a onclick="navigate('fragmentos')">Fragmentos</a>
                <a onclick="navigate('recuerdos')">Recuerdos</a>
                <a onclick="navigate('pensamientos')">Pensamientos</a>
                <a onclick="navigate('suenos')">Sueños</a>
            </div>
        </div>
    </div>

    <div id="fragmentos" class="section">
        "A veces el silencio grita más fuerte que cualquier palabra."
    </div>

    <div id="recuerdos" class="section">
        "Los recuerdos no duelen... hasta que se vuelven lejanos."
    </div>

    <div id="pensamientos" class="section">
        "Mi mente es un cuarto sin ventanas."
    </div>

    <div id="suenos" class="section">
        "En mis sueños el mundo no duele."
    </div>

</div>

<audio id="music" loop>
  <source src="elephant2.mp3" type="audio/mpeg">
</audio>

<script>
function enter() {
    document.querySelector(".intro").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("music").play();
}

function navigate(section) {
    history.pushState(null, "", "#" + section);
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(section).classList.add("active");
}
</script>

</body>
</html>
