<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hikikomori</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: black;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

.light {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(0,0,0,0.95) 70%);
}

.content {
    position: relative;
    text-align: center;
    top: 30%;
    z-index: 2;
}

h1 {
    font-size: 3em;
    letter-spacing: 8px;
    font-weight: 200;
}

.subtitle {
    color: #aaa;
    margin-bottom: 40px;
    font-style: italic;
}

.menu a {
    display: block;
    color: #777;
    text-decoration: none;
    margin: 15px;
    font-size: 1.1em;
    transition: 0.4s;
}

.menu a:hover {
    color: white;
    letter-spacing: 4px;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
}
</style>
</head>
<body>

<div class="light"></div>

<div class="content">
    <h1>HIKIKOMORI</h1>
    <div class="subtitle">El eco de mis pensamientos</div>

    <div class="menu">
        <a href="fragmentos.html">Fragmentos</a>
        <a href="recuerdos.html">Recuerdos</a>
        <a href="pensamientos.html">Pensamientos</a>
        <a href="suenos.html">Sueños</a>
    </div>
</div>

<canvas id="rain"></canvas>

<script>
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let drops = [];

for (let i = 0; i < 250; i++) {
    drops.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        length: Math.random() * 20,
        speed: Math.random() * 4 + 2
    });
}

function drawRain() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 1;
    ctx.beginPath();

    for (let i = 0; i < drops.length; i++) {
        let d = drops[i];
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x, d.y + d.length);
        d.y += d.speed;

        if (d.y > canvas.height) {
            d.y = -20;
        }
    }

    ctx.stroke();
}

setInterval(drawRain, 30);
</script>

</body>
</html>
