<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hikikomori</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:'Cormorant Garamond', serif;
    overflow:hidden;
}

/* PARTICULAS */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

/* INTRO */
.intro{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
    transition:opacity 1s ease;
}

.intro h1{
    font-size:3.5em;
    letter-spacing:10px;
    font-weight:300;
}

.intro button{
    margin-top:40px;
    padding:12px 35px;
    background:transparent;
    border:1px solid #444;
    color:#aaa;
    cursor:pointer;
    transition:all 0.5s ease;
}

.intro button:hover{
    border-color:white;
    color:white;
    letter-spacing:3px;
    box-shadow:0 0 30px rgba(255,255,255,0.2);
}

/* MAIN */
.main{
    display:none;
    height:100vh;
    position:relative;
    z-index:1;
}

/* HOME */
.home{
    display:flex;
    height:100%;
    transition:opacity 0.8s ease, transform 0.8s ease;
}

.left{
    flex:2;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding-left:10%;
}

#mainTitle{
    font-size:4em;
    letter-spacing:12px;
    font-weight:300;
    margin:0;
    transition:all 0.8s ease;
}

.subtitle{
    color:#888;
    font-style:italic;
    margin-top:20px;
    font-size:1.2em;
    animation:glow 4s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px rgba(255,255,255,0.1);}
    to{ text-shadow:0 0 30px rgba(255,255,255,0.4);}
}

.right{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.menu a{
    display:block;
    margin:25px 0;
    cursor:pointer;
    color:#555;
    font-size:1.4em;
    transition:all 0.5s ease;
}

.menu a:hover{
    color:white;
    letter-spacing:5px;
    text-shadow:0 0 20px rgba(255,255,255,0.5);
}

/* SECTION */
.section-view{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    opacity:0;
    transform:translateY(40px);
    transition:opacity 1s ease, transform 1s ease;
}

.section-view.active{
    opacity:1;
    transform:translateY(0);
}

.section-title{
    position:absolute;
    top:40px;
    font-size:2.5em;
    letter-spacing:10px;
    opacity:0.7;
}

.section-content{
    max-width:700px;
    font-size:1.5em;
    color:#bbb;
    animation:fadeText 1.5s ease;
}

@keyframes fadeText{
    from{opacity:0;}
    to{opacity:1;}
}

.back{
    position:absolute;
    bottom:50px;
    padding:12px 35px;
    border:1px solid #444;
    color:#aaa;
    cursor:pointer;
    transition:all 0.5s ease;
}

.back:hover{
    border-color:white;
    color:white;
    box-shadow:0 0 30px rgba(255,255,255,0.3);
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="intro">
    <h1>HIKIKOMORI</h1>
    <button onclick="enter()">Entrar con sonido</button>
</div>

<div class="main" id="main">

    <div class="home" id="home">
        <div class="left">
            <h1 id="mainTitle">HIKIKOMORI</h1>
            <div class="subtitle">El eco de mis pensamientos</div>
        </div>

        <div class="right">
            <div class="menu">
                <a onclick="openSection('fragmentos')">Fragmentos</a>
                <a onclick="openSection('recuerdos')">Recuerdos</a>
                <a onclick="openSection('pensamientos')">Pensamientos</a>
                <a onclick="openSection('suenos')">Sueños</a>
            </div>
        </div>
    </div>

    <div class="section-view" id="sectionView">
        <div class="section-title">HIKIKOMORI</div>
        <div class="section-content" id="sectionText"></div>
        <div class="back" onclick="goBack()">Volver atrás</div>
    </div>

</div>

<audio id="music" loop>
  <source src="elephant2.mp3" type="audio/mpeg">
</audio>

<script>
function enter(){
    document.querySelector(".intro").style.opacity="0";
    setTimeout(()=>{
        document.querySelector(".intro").style.display="none";
        document.getElementById("main").style.display="block";
        document.getElementById("music").play();
    },1000);
}

const texts={
    fragmentos:"A veces el silencio grita más fuerte que cualquier palabra.",
    recuerdos:"Los recuerdos no duelen... hasta que se vuelven lejanos.",
    pensamientos:"Mi mente es un cuarto sin ventanas.",
    suenos:"En mis sueños el mundo no duele."
};

function openSection(name){
    const home=document.getElementById("home");
    home.style.opacity="0";
    home.style.transform="translateY(-40px)";
    
    setTimeout(()=>{
        home.style.display="none";
        const section=document.getElementById("sectionView");
        document.getElementById("sectionText").innerText=texts[name];
        section.style.display="flex";
        setTimeout(()=>section.classList.add("active"),50);
    },800);
}

function goBack(){
    const section=document.getElementById("sectionView");
    section.classList.remove("active");
    
    setTimeout(()=>{
        section.style.display="none";
        const home=document.getElementById("home");
        home.style.display="flex";
        setTimeout(()=>{
            home.style.opacity="1";
            home.style.transform="translateY(0)";
        },50);
    },800);
}

/* PARTICULAS */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        radius:Math.random()*2,
        speed:Math.random()*0.5+0.2
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(255,255,255,0.2)";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        ctx.fill();
        p.y-=p.speed;
        if(p.y<0){
            p.y=canvas.height;
            p.x=Math.random()*canvas.width;
        }
    });
    requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize",()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});
</script>

</body>
</html>
