<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hikikomori</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:'Segoe UI',sans-serif;
}

.intro{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}

.intro button{
    margin-top:30px;
    padding:10px 25px;
    background:none;
    border:1px solid #555;
    color:#aaa;
    cursor:pointer;
}

.main{
    display:none;
    height:100vh;
    position:relative;
}

.home{
    display:flex;
    height:100%;
}

.left{
    flex:2;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding-left:10%;
}

.right{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.menu a{
    display:block;
    margin:20px 0;
    cursor:pointer;
    color:#666;
}

.section-view{
    display:none;
    height:100%;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.section-view h1{
    position:absolute;
    top:40px;
    font-weight:200;
}

.back{
    position:absolute;
    bottom:40px;
    cursor:pointer;
    border:1px solid #555;
    padding:8px 20px;
}
</style>
</head>
<body>

<div class="intro">
    <h1>HIKIKOMORI</h1>
    <button onclick="enter()">Entrar con sonido</button>
</div>

<div class="main" id="main">

    <div class="home" id="home">
        <div class="left">
            <h1>HIKIKOMORI</h1>
            <p>El eco de mis pensamientos</p>
        </div>

        <div class="right">
            <div class="menu">
                <a onclick="openSection('fragmentos')">Fragmentos</a>
                <a onclick="openSection('recuerdos')">Recuerdos</a>
                <a onclick="openSection('pensamientos')">Pensamientos</a>
                <a onclick="openSection('suenos')">Sueños</a>
            </div>
        </div>
    </div>

    <div class="section-view" id="sectionView">
        <h1>HIKIKOMORI</h1>
        <div id="sectionText"></div>
        <div class="back" onclick="goBack()">Volver atrás</div>
    </div>

</div>

<audio id="music" loop>
  <source src="elephant2.mp3" type="audio/mpeg">
</audio>

<script>
function enter(){
    document.querySelector(".intro").style.display="none";
    document.getElementById("main").style.display="block";
    document.getElementById("music").play();
}

const texts={
    fragmentos:"A veces el silencio grita más fuerte que cualquier palabra.",
    recuerdos:"Los recuerdos no duelen... hasta que se vuelven lejanos.",
    pensamientos:"Mi mente es un cuarto sin ventanas.",
    suenos:"En mis sueños el mundo no duele."
};

function openSection(name){
    document.getElementById("home").style.display="none";
    document.getElementById("sectionView").style.display="flex";
    document.getElementById("sectionText").innerText=texts[name];
}

function goBack(){
    document.getElementById("sectionView").style.display="none";
    document.getElementById("home").style.display="flex";
}
</script>

</body>
</html>
