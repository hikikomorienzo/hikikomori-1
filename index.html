<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hikikomori</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
}

/* INTRO */
.intro{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
    transition:opacity 0.8s ease;
}

.intro h1{
    font-size:3em;
    letter-spacing:8px;
    font-weight:200;
}

.intro button{
    margin-top:40px;
    padding:12px 35px;
    background:transparent;
    border:1px solid #444;
    color:#aaa;
    cursor:pointer;
    transition:all 0.4s ease;
}

.intro button:hover{
    border-color:white;
    color:white;
    letter-spacing:2px;
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* MAIN */
.main{
    display:none;
    height:100vh;
    position:relative;
}

/* HOME LAYOUT */
.home{
    display:flex;
    height:100%;
    transition:opacity 0.6s ease, transform 0.6s ease;
}

.left{
    flex:2;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding-left:10%;
}

.left h1{
    font-size:3.5em;
    letter-spacing:8px;
    font-weight:200;
    margin:0;
    transition:all 0.6s ease;
}

.left p{
    color:#888;
    font-style:italic;
    margin-top:15px;
    animation:glow 3s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 5px rgba(255,255,255,0.1);}
    to{ text-shadow:0 0 20px rgba(255,255,255,0.4);}
}

.right{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.menu a{
    display:block;
    margin:20px 0;
    cursor:pointer;
    color:#555;
    font-size:1.1em;
    transition:all 0.4s ease;
}

.menu a:hover{
    color:white;
    letter-spacing:4px;
    text-shadow:0 0 15px rgba(255,255,255,0.4);
}

/* SECTION VIEW */
.section-view{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    opacity:0;
    transform:translateY(20px);
    transition:opacity 0.6s ease, transform 0.6s ease;
}

.section-view.active{
    opacity:1;
    transform:translateY(0);
}

.section-title{
    position:absolute;
    top:40px;
    font-size:2em;
    letter-spacing:6px;
    font-weight:200;
    opacity:0.8;
}

.section-content{
    max-width:600px;
    color:#bbb;
    font-size:1.2em;
    animation:fadeText 1s ease;
}

@keyframes fadeText{
    from{opacity:0;}
    to{opacity:1;}
}

.back{
    position:absolute;
    bottom:40px;
    padding:10px 30px;
    border:1px solid #444;
    color:#aaa;
    cursor:pointer;
    transition:all 0.4s ease;
}

.back:hover{
    border-color:white;
    color:white;
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}
</style>
</head>
<body>

<div class="intro">
    <h1>HIKIKOMORI</h1>
    <button onclick="enter()">Entrar con sonido</button>
</div>

<div class="main" id="main">

    <div class="home" id="home">
        <div class="left">
            <h1 id="mainTitle">HIKIKOMORI</h1>
            <p>El eco de mis pensamientos</p>
        </div>

        <div class="right">
            <div class="menu">
                <a onclick="openSection('fragmentos')">Fragmentos</a>
                <a onclick="openSection('recuerdos')">Recuerdos</a>
                <a onclick="openSection('pensamientos')">Pensamientos</a>
                <a onclick="openSection('suenos')">Sueños</a>
            </div>
        </div>
    </div>

    <div class="section-view" id="sectionView">
        <div class="section-title">HIKIKOMORI</div>
        <div class="section-content" id="sectionText"></div>
        <div class="back" onclick="goBack()">Volver atrás</div>
    </div>

</div>

<audio id="music" loop>
  <source src="elephant2.mp3" type="audio/mpeg">
</audio>

<script>
function enter(){
    document.querySelector(".intro").style.opacity="0";
    setTimeout(()=>{
        document.querySelector(".intro").style.display="none";
        document.getElementById("main").style.display="block";
        document.getElementById("music").play();
    },800);
}

const texts={
    fragmentos:"A veces el silencio grita más fuerte que cualquier palabra.",
    recuerdos:"Los recuerdos no duelen... hasta que se vuelven lejanos.",
    pensamientos:"Mi mente es un cuarto sin ventanas.",
    suenos:"En mis sueños el mundo no duele."
};

function openSection(name){
    const home=document.getElementById("home");
    home.style.opacity="0";
    home.style.transform="translateY(-20px)";
    
    setTimeout(()=>{
        home.style.display="none";
        const section=document.getElementById("sectionView");
        document.getElementById("sectionText").innerText=texts[name];
        section.style.display="flex";
        setTimeout(()=>section.classList.add("active"),50);
    },500);
}

function goBack(){
    const section=document.getElementById("sectionView");
    section.classList.remove("active");
    
    setTimeout(()=>{
        section.style.display="none";
        const home=document.getElementById("home");
        home.style.display="flex";
        setTimeout(()=>{
            home.style.opacity="1";
            home.style.transform="translateY(0)";
        },50);
    },500);
}
</script>

</body>
</html>
