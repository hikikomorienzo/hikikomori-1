<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hikikomori</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #000;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 0;
}

.container {
    display: flex;
    height: 100vh;
    width: 100vw;
    position: relative;
    z-index: 1;
}

/* Zona izquierda grande (titulo) */
.main-text {
    flex: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 10%;
}

.main-text h1 {
    font-size: 3.5em;
    letter-spacing: 8px;
    font-weight: 200;
    margin: 0;
}

.main-text p {
    color: #888;
    font-style: italic;
    margin-top: 10px;
}

/* Zona derecha (menu) */
.menu-panel {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.menu a {
    display: block;
    color: #666;
    text-decoration: none;
    margin: 20px 0;
    font-size: 1.2em;
    transition: 0.3s;
}

.menu a:hover {
    color: white;
    letter-spacing: 4px;
}
</style>
</head>
<body>

<canvas id="rain"></canvas>

<div class="container">
    <div class="main-text">
        <h1>HIKIKOMORI</h1>
        <p>El eco de mis pensamientos</p>
    </div>

    <div class="menu-panel">
        <div class="menu">
            <a href="fragmentos.html">Fragmentos</a>
            <a href="recuerdos.html">Recuerdos</a>
            <a href="pensamientos.html">Pensamientos</a>
            <a href="suenos.html">Sueños</a>
        </div>
    </div>
</div>

<audio autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=rain-ambient-110624.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let drops = [];

for (let i = 0; i < 300; i++) {
    drops.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        length: Math.random() * 20,
        speed: Math.random() * 4 + 2
    });
}

function drawRain() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "rgba(255,255,255,0.06)";
    ctx.lineWidth = 1;
    ctx.beginPath();

    for (let i = 0; i < drops.length; i++) {
        let d = drops[i];
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x, d.y + d.length);
        d.y += d.speed;

        if (d.y > canvas.height) {
            d.y = -20;
        }
    }

    ctx.stroke();
}

setInterval(drawRain, 30);

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
