<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hikikomori</title>
<style>
body {
    margin: 0;
    padding: 0;
    background: black;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* Lluvia en canvas */
canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 0;
}

/* Contenedor principal dividido */
.container {
    display: flex;
    height: 100vh;
    width: 100vw;
    position: relative;
    z-index: 1;
}

/* Rectángulo rojo grande */
.main-text {
    flex: 2;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(255, 0, 0, 0.1);
    color: white;
    font-size: 3em;
    letter-spacing: 5px;
    text-align: center;
    padding: 40px;
}

/* Rectángulo azul grande (menú) */
.menu-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: rgba(0, 0, 255, 0.05);
    padding: 40px;
}

/* Menú de botones */
.menu a {
    display: block;
    color: #aaa;
    text-decoration: none;
    margin: 20px 0;
    font-size: 1.2em;
    transition: 0.3s;
}

.menu a:hover {
    color: white;
    letter-spacing: 3px;
}

/* Rectángulo azul pequeño (zona vacía / efectos) */
.side-panel {
    flex: 1;
    background: rgba(0, 0, 255, 0.05);
    margin-left: 20px;
}

/* Ajustes responsivos */
@media(max-width: 900px) {
    .container {
        flex-direction: column;
    }
    .side-panel {
        margin-left: 0;
        height: 100px;
    }
}
</style>
</head>
<body>

<canvas id="rain"></canvas>

<div class="container">
    <div class="main-text">
        HIKIKOMORI
        <div style="font-size: 0.3em; margin-top:10px; font-style:italic;">El eco de mis pensamientos</div>
    </div>
    <div class="menu-panel">
        <div class="menu">
            <a href="fragmentos.html">Fragmentos</a>
            <a href="recuerdos.html">Recuerdos</a>
            <a href="pensamientos.html">Pensamientos</a>
            <a href="suenos.html">Sueños</a>
        </div>
    </div>
    <div class="side-panel"></div>
</div>

<!-- Sonido de lluvia -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- Lluvia animada -->
<script>
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let drops = [];

for (let i = 0; i < 250; i++) {
    drops.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        length: Math.random() * 20,
        speed: Math.random() * 4 + 2
    });
}

function drawRain() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 1;
    ctx.beginPath();

    for (let i = 0; i < drops.length; i++) {
        let d = drops[i];
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x, d.y + d.length);
        d.y += d.speed;

        if (d.y > canvas.height) {
            d.y = -20;
        }
    }

    ctx.stroke();
}

setInterval(drawRain, 30);

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
