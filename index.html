<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hikikomori</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
}

/* Intro */
.intro{
    position:absolute;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:5;
}

.intro h1{
    font-size:3em;
    letter-spacing:8px;
    font-weight:200;
}

.intro button{
    margin-top:40px;
    padding:12px 30px;
    background:transparent;
    border:1px solid #555;
    color:#aaa;
    cursor:pointer;
    transition:0.3s;
}

.intro button:hover{
    border-color:white;
    color:white;
}

/* MAIN */
.main{
    display:none;
    height:100vh;
    position:relative;
}

/* Pantalla inicio */
.home{
    display:flex;
    height:100%;
}

.left{
    flex:2;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding-left:10%;
}

.left h1{
    font-size:3.5em;
    letter-spacing:8px;
    font-weight:200;
    margin:0;
}

.left p{
    color:#aaa;
    font-style:italic;
    margin-top:15px;
    animation:glow 3s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 5px rgba(255,255,255,0.2);}
    to{ text-shadow:0 0 15px rgba(255,255,255,0.4);}
}

.right{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.menu a{
    display:block;
    color:#666;
    text-decoration:none;
    margin:20px 0;
    font-size:1.2em;
    cursor:pointer;
    transition:0.3s;
}

.menu a:hover{
    color:white;
    letter-spacing:4px;
}

/* Vista sección */
.section-view{
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100%;
    text-align:center;
}

.section-view h1{
    position:absolute;
    top:40px;
    font-size:2em;
    letter-spacing:6px;
    font-weight:200;
}

.section-content{
    max-width:600px;
    color:#bbb;
    font-size:1.2em;
}

.back-btn{
    position:absolute;
    bottom:40px;
    padding:10px 25px;
    background:transparent;
    border:1px solid #555;
    color:#aaa;
    cursor:pointer;
    transition:0.3s;
}

.back-btn:hover{
    border-color:white;
    color:white;
}
</style>
</head>
<body>

<div class="intro">
    <h1>HIKIKOMORI</h1>
    <button onclick="enter()">Entrar con sonido</button>
</div>

<div class="main" id="main">

    <!-- HOME -->
    <div class="home" id="home">

        <div class="left">
            <h1>HIKIKOMORI</h1>
            <p>El eco de mis pensamientos</p>
        </div>

        <div class="right">
            <div class="menu">
                <a onclick="openSection('fragmentos')">Fragmentos</a>
                <a onclick="openSection('recuerdos')">Recuerdos</a>
                <a onclick="openSection('pensamientos')">Pensamientos</a>
                <a onclick="openSection('suenos')">Sueños</a>
            </div>
        </div>

    </div>

    <!-- SECTION VIEW -->
    <div class="section-view" id="sectionView">
        <h1>HIKIKOMORI</h1>
        <div class="section-content" id="sectionText"></div>
        <button class="back-btn" onclick="goBack()">Volver atrás</button>
    </div>

</div>

<audio id="music" loop>
  <source src="elephant2.mp3" type="audio/mpeg">
</audio>

<script>
function enter(){
    document.querySelector(".intro").style.display="none";
    document.getElementById("main").style.display="block";
    document.getElementById("music").play();
}

const texts={
    fragmentos:"A veces el silencio grita más fuerte que cualquier palabra.",
    recuerdos:"Los recuerdos no duelen... hasta que se vuelven lejanos.",
    pensamientos:"Mi mente es un cuarto sin ventanas.",
    suenos:"En mis sueños el mundo no duele."
};

function openSection(section){
    document.getElementById("home").style.display="none";
    document.getElementById("sectionView").style.display="flex";
    document.getElementById("sectionText").innerText=texts[section];
}

function goBack(){
    document.getElementById("sectionView").style.display="none";
    document.getElementById("home").style.display="flex";
}
</script>

</body>
</html>
