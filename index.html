<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hikikomori</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:'Cormorant Garamond', serif;
    overflow:hidden;
}

/* CANVAS */
canvas{
    position:fixed;
    top:0;
    left:0;
}

#particles{ z-index:0; }

#grain{
    z-index:2;
    pointer-events:none;
    opacity:0.08;
}

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    opacity:0;
    transition:opacity 1s ease;
    z-index:1;
    pointer-events:none;
}

/* INTRO */
.intro{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
    transition:opacity 1s ease;
}

.intro h1{
    font-size:3.5em;
    letter-spacing:10px;
    font-weight:300;
}

.intro button{
    margin-top:40px;
    padding:12px 35px;
    background:transparent;
    border:1px solid #444;
    color:#aaa;
    cursor:pointer;
    transition:all 0.5s ease;
}

.intro button:hover{
    border-color:white;
    color:white;
    letter-spacing:3px;
    box-shadow:0 0 30px rgba(255,255,255,0.2);
}

.main{
    display:none;
    height:100vh;
    position:relative;
    z-index:3;
}

.home{
    display:flex;
    height:100%;
    transition:opacity 0.8s ease, transform 0.8s ease;
}

.left{
    flex:2;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding-left:10%;
}

#mainTitle{
    font-size:4em;
    letter-spacing:12px;
    font-weight:300;
    margin:0;
}

.subtitle{
    color:#888;
    font-style:italic;
    margin-top:20px;
    font-size:1.2em;
    animation:glow 4s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px rgba(255,255,255,0.1);}
    to{ text-shadow:0 0 30px rgba(255,255,255,0.4);}
}

.right{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.menu a{
    display:block;
    margin:25px 0;
    cursor:pointer;
    color:#555;
    font-size:1.4em;
    transition:all 0.5s ease;
}

.menu a:hover{
    color:white;
    letter-spacing:5px;
    text-shadow:0 0 20px rgba(255,255,255,0.5);
}

/* SECTION VIEW */
.section-view{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    opacity:0;
    transform:translateY(40px);
    transition:opacity 1s ease, transform 1s ease;
}

.section-view.active{
    opacity:1;
    transform:translateY(0);
}

.section-title{
    position:absolute;
    top:40px;
    font-size:2.5em;
    letter-spacing:10px;
    opacity:0.7;
}

/* LAYOUT TEXTO + IMAGEN */
.section-layout{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:70px;
    max-width:1100px;
    width:90%;
}

.section-content{
    max-width:500px;
    font-size:1.4em;
    line-height:1.6;
    text-shadow:0 0 20px rgba(0,0,0,0.8);
}

.section-image-container{
    max-width:420px;
}

.section-image-container img{
    width:100%;
    border-radius:10px;
    filter:brightness(0.75);
    box-shadow:0 0 60px rgba(0,0,0,0.9);
    transition:transform 1s ease;
}

.section-view.active img{
    transform:scale(1.03);
}

.back{
    position:absolute;
    bottom:50px;
    padding:12px 35px;
    border:1px solid #444;
    color:#aaa;
    cursor:pointer;
    transition:all 0.5s ease;
}

.back:hover{
    border-color:white;
    color:white;
    box-shadow:0 0 30px rgba(255,255,255,0.3);
}

/* RESPONSIVE */
@media(max-width:900px){
    .section-layout{
        flex-direction:column;
    }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<canvas id="grain"></canvas>
<div class="overlay" id="overlay"></div>

<div class="intro">
    <h1>HIKIKOMORI</h1>
    <button onclick="enter()">Entrar con sonido</button>
</div>

<div class="main" id="main">

    <div class="home" id="home">
        <div class="left">
            <h1 id="mainTitle">HIKIKOMORI</h1>
            <div class="subtitle">El eco de mis pensamientos</div>
        </div>

        <div class="right">
            <div class="menu">
                <a onclick="openSection('nuncadije')">Lo que nunca dije</a>
                <a onclick="openSection('cuandotepienso')">Cuando te pienso</a>
                <a onclick="openSection('loquekeda')">Lo que queda</a>
                <a onclick="openSection('sivuelves')">Si algún día vuelves</a>
            </div>
        </div>
    </div>

    <div class="section-view" id="sectionView">
        <div class="section-title">HIKIKOMORI</div>

        <div class="section-layout" id="sectionLayout">
            <div class="section-content" id="sectionText"></div>
            <div class="section-image-container">
                <img id="sectionImage" src="">
            </div>
        </div>

        <div class="back" onclick="goBack()">Volver atrás</div>
    </div>

</div>

<audio id="music" loop>
  <source src="elephant2.mp3" type="audio/mpeg">
</audio>

<script>
function enter(){
    document.querySelector(".intro").style.opacity="0";
    setTimeout(()=>{
        document.querySelector(".intro").style.display="none";
        document.getElementById("main").style.display="block";
        document.getElementById("music").play();
    },1000);
}

const texts={
    nuncadije:"A veces quise decirte que tenía miedo de perderte. Miedo de que un día simplemente dejaras de mirarme igual. Pero me quedé callado… y ahora el silencio pesa más que cualquier palabra.",
    cuandotepienso:"No es nostalgia. Es ese instante pequeño donde todo se detiene. Cuando una canción suena, cuando una luz entra por la ventana, cuando te recuerdo sin querer.",
    loquekeda:"No sé exactamente qué fuimos. Pero aún queda algo. En mi forma de pensar, en la manera en que todavía te busco en cosas que no eres tú.",
    sivuelves:"Si algún día vuelves, no te pediría explicaciones. No hablaría del pasado. Solo me gustaría que te quedaras… un poco más esta vez."
};

function openSection(name){

    document.getElementById("overlay").style.opacity="0.6";

    const home=document.getElementById("home");
    home.style.opacity="0";
    home.style.transform="translateY(-40px)";
    
    setTimeout(()=>{
        home.style.display="none";

        const section=document.getElementById("sectionView");
        document.getElementById("sectionText").innerText=texts[name];

        const img=document.getElementById("sectionImage");
        img.src=name + ".jpg";

        const layout=document.getElementById("sectionLayout");

        if(name==="cuandotepienso" || name==="sivuelves"){
            layout.style.flexDirection="row-reverse";
        } else {
            layout.style.flexDirection="row";
        }

        section.style.display="flex";
        setTimeout(()=>section.classList.add("active"),50);
    },800);
}

function goBack(){
    document.getElementById("overlay").style.opacity="0";

    const section=document.getElementById("sectionView");
    section.classList.remove("active");
    
    setTimeout(()=>{
        section.style.display="none";
        const home=document.getElementById("home");
        home.style.display="flex";
        setTimeout(()=>{
            home.style.opacity="1";
            home.style.transform="translateY(0)";
        },50);
    },800);
}

/* PARTICULAS */
const pCanvas=document.getElementById("particles");
const pCtx=pCanvas.getContext("2d");
pCanvas.width=innerWidth;
pCanvas.height=innerHeight;

let particles=[];
for(let i=0;i<70;i++){
    particles.push({
        x:Math.random()*pCanvas.width,
        y:Math.random()*pCanvas.height,
        r:Math.random()*2,
        s:Math.random()*0.4+0.1
    });
}

function animateParticles(){
    pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
    pCtx.fillStyle="rgba(255,255,255,0.2)";
    particles.forEach(p=>{
        pCtx.beginPath();
        pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
        pCtx.fill();
        p.y-=p.s;
        if(p.y<0){
            p.y=pCanvas.height;
            p.x=Math.random()*pCanvas.width;
        }
    });
    requestAnimationFrame(animateParticles);
}
animateParticles();

/* GRANO */
const gCanvas=document.getElementById("grain");
const gCtx=gCanvas.getContext("2d");
gCanvas.width=innerWidth;
gCanvas.height=innerHeight;

function generateGrain(){
    const imageData=gCtx.createImageData(gCanvas.width,gCanvas.height);
    for(let i=0;i<imageData.data.length;i+=4){
        const v=Math.random()*255;
        imageData.data[i]=v;
        imageData.data[i+1]=v;
        imageData.data[i+2]=v;
        imageData.data[i+3]=30;
    }
    gCtx.putImageData(imageData,0,0);
}

setInterval(generateGrain,80);

window.addEventListener("resize",()=>{
    pCanvas.width=gCanvas.width=innerWidth;
    pCanvas.height=gCanvas.height=innerHeight;
});
</script>

</body>
</html>
